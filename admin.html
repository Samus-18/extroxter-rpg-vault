<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Extroxter Vault Admin Generator</title>
<style>
:root{--bg:#07080e;--panel:#111827;--line:rgba(135,205,255,.22);--text:#f4f8ff;--muted:#a9b7c9;--cyan:#60efff;--gold:#ffd166;--purple:#9b5cff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 10%,rgba(96,239,255,.15),transparent 30%),linear-gradient(180deg,#07080e,#101323);font-family:Segoe UI,Arial,sans-serif;color:var(--text)}.wrap{width:min(980px,calc(100% - 30px));margin:0 auto;padding:30px 0}.panel{background:rgba(17,24,39,.82);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 22px 70px rgba(0,0,0,.45)}h1{font-size:42px;margin:0 0 10px;background:linear-gradient(90deg,#fff,var(--cyan),var(--gold));-webkit-background-clip:text;color:transparent}.lead{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px;margin:10px 0}.field label{font-weight:800;color:#dfe9ff}.field input,.field textarea,.field select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;color:var(--text);padding:12px;font-size:15px}.field textarea{min-height:92px}.btn{border:0;border-radius:15px;padding:13px 16px;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--purple));color:#07101a;cursor:pointer}.ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}pre{white-space:pre-wrap;word-break:break-word;background:#03060c;border:1px solid var(--line);border-radius:18px;padding:16px;color:#dffcff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <a href="index.html" style="color:var(--cyan)">← zpět na stránku</a>
    <h1>Admin generator</h1>
    <p class="lead">Tohle ti jen vygeneruje JSON položku. Tu pak vložíš do <b>downloads/manifest.json</b> do pole <b>items</b>.</p>
    <div class="grid">
      <div class="field"><label>Název</label><input id="name" placeholder="Devourer Ascension" /></div>
      <div class="field"><label>Verze</label><input id="version" placeholder="0.5.16" /></div>
      <div class="field"><label>Hra</label><select id="game"><option value="minecraft">Minecraft</option><option value="tboi">The Binding of Isaac: Repentance</option></select></div>
      <div class="field"><label>Typ</label><select id="type"><option value="mod">Mod</option><option value="texture">Texture Pack</option><option value="shader">Shader</option></select></div>
      <div class="field"><label>Loader / požadavky</label><input id="loader" placeholder="Forge 1.20.1 / Repentogon / Oculus" /></div>
      <div class="field"><label>Rarity</label><select id="rarity"><option>legendary</option><option>epic</option><option>rare</option><option>common</option></select></div>
      <div class="field"><label>Ikona emoji</label><input id="icon" placeholder="⚔" /></div>
      <div class="field"><label>Download link</label><input id="file" placeholder="https://github.com/.../releases/download/.../file.zip" /></div>
    </div>
    <div class="field"><label>Popis</label><textarea id="description" placeholder="Krátký popis projektu..."></textarea></div>
    <div class="actions"><button class="btn" onclick="generate()">Vygenerovat položku</button><button class="btn ghost" onclick="copyOut()">Kopírovat</button></div>
    <pre id="out">Klikni na vygenerovat.</pre>
  </div>
</div>
<script>
function val(id){return document.getElementById(id).value.trim()}
function generate(){
 const item={name:val('name')||'Unnamed Project',game:val('game'),type:val('type'),version:val('version')||'1.0',rarity:val('rarity')||'common',icon:val('icon')||'📦',loader:val('loader'),description:val('description'),file:val('file')||'#'};
 document.getElementById('out').textContent=JSON.stringify(item,null,2)+',';
}
function copyOut(){navigator.clipboard.writeText(document.getElementById('out').textContent)}
</script>
</body>
</html>
